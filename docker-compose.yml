services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: prism-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: canvas
      CLICKHOUSE_PASSWORD: canvas
      CLICKHOUSE_DB: canvas
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse

volumes:
  clickhouse-data:
